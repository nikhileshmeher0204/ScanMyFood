#spring.h2.console.enabled=true


# Google Cloud configuration
google.cloud.project-id=${GCP_PROJECT_ID}
google.cloud.location=${GCP_LOCATION}

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:scanmyfood}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

#Jackson Configuration
spring.jackson.property-naming-strategy=com.fasterxml.jackson.databind.PropertyNamingStrategies.SnakeCaseStrategy

#mybatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.com.scanmyfood.backend.mapper=DEBUG

# Storage Configuration
# Options: local, s3, gcs
storage.type=${STORAGE_TYPE:local}

# Local Storage (for development)
storage.local.base-dir=${STORAGE_LOCAL_BASE_DIR:C:/scanmyfood-uploads/food-images}

# AWS S3 (for production - uncomment when needed)
#storage.s3.bucket-name=${S3_BUCKET_NAME}
#storage.s3.region=${S3_REGION}

# Google Cloud Storage (alternative - uncomment when needed)
#storage.gcs.bucket-name=${GCS_BUCKET_NAME}

# Server port (for local URL generation)
server.port=${SERVER_PORT:8080}
