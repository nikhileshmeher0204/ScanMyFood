#spring.jpa.show-sql=true
#spring.h2.console.enabled=true


# Google Cloud configuration
google.cloud.project-id=foodscanai-d28bc
google.cloud.location=us-central1

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/scanmyfood
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:your_password_here}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

#Jackson Configuration
spring.jackson.property-naming-strategy=com.fasterxml.jackson.databind.PropertyNamingStrategies.SnakeCaseStrategy

#mybatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.com.scanmyfood.backend.mapper=DEBUG

# Storage Configuration
# Options: local, s3, gcs
storage.type=local

# Local Storage (for development)
storage.local.base-dir=C:/scanmyfood-uploads/food-images

# AWS S3 (for production - uncomment when needed)
#storage.s3.bucket-name=scanmyfood-images
#storage.s3.region=us-east-1

# Google Cloud Storage (alternative - uncomment when needed)
#storage.gcs.bucket-name=scanmyfood-images

# Server port (for local URL generation)
server.port=8080
